name: JS Unit Tests

on:
  push:
    branches: [ main ]
    paths:
      - aisuite-js/**
      - .github/workflows/run_js_tests.yml
  pull_request:
    branches: [ main ]
    paths:
      - aisuite-js/**
      - .github/workflows/run_js_tests.yml

jobs:
  js_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aisuite-js
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
